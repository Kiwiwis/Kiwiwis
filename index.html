<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State-Aware Exam Tracker</title>

<style>
body { font-family: Arial, sans-serif; background:#f4f9fb; color:#333; }
.container { max-width:900px; margin:auto; padding:20px; }
.btn { padding:8px 15px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:10px; text-decoration:none; display:inline-block;}
.exam-block { background:white; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.countdown { font-weight:bold; margin-top:8px; color:#2c7a7b;}
.warning { color:#d9534f; font-weight:bold;}
.success { color:#28a745; font-weight:bold;}
</style>
</head>

<body>

<div class="container">
    <h2>State & National Exam Tracker</h2>

    <label>Select Your State:</label>
    <select id="stateSelect">
        <option value="">--Select State--</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Uttar Pradesh">Uttar Pradesh</option>
        <option value="West Bengal">West Bengal</option>
        <option value="Bihar">Bihar</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Telangana">Telangana</option>
        <option value="Odisha">Odisha</option>
        <option value="Punjab">Punjab</option>
    </select>
    <br><br>
    <button class="btn" onclick="showExams()">Continue</button>

    <div id="examSelection"></div>
    <div id="examForms"></div>
</div>

<script>

// National Exams
const nationalExams = {
    "JEE Main": { 
        examDate: new Date("2026-04-02T00:00:00"),
        regDeadline: new Date("2026-02-28T23:59:59"),
        regLink: "https://jeemain.nta.nic.in/"
    },
    "NEET": { 
        examDate: new Date("2026-05-03T10:00:00"),
        regDeadline: new Date("2026-03-15T23:59:59"),
        regLink: "https://neet.nta.nic.in/"
    },
    "UPSC Civil Services": { 
        examDate: new Date("2026-05-24T09:00:00"),
        regDeadline: new Date("2026-02-03T23:59:59"),
        regLink: "https://upsc.gov.in/"
    },
    "SSC CGL": { 
        examDate: new Date("2026-06-01T10:00:00"),
        regDeadline: new Date("2026-04-15T23:59:59"),
        regLink: "https://ssc.nic.in/"
    }
};

// State Exams
const stateExams = {
    "Maharashtra": { 
        "MHT CET": { 
            examDate: new Date("2026-04-20T10:00:00"),
            regDeadline: new Date("2026-03-05T23:59:59"),
            regLink: "https://cetcell.mahacet.org/"
        } 
    },
    "Karnataka": { 
        "KCET": { 
            examDate: new Date("2026-04-18T10:00:00"),
            regDeadline: new Date("2026-03-01T23:59:59"),
            regLink: "https://cetonline.karnataka.gov.in/"
        } 
    }
};

function showExams() {
    const state = document.getElementById("stateSelect").value;
    const container = document.getElementById("examSelection");
    const formsContainer = document.getElementById("examForms");
    formsContainer.innerHTML = "";
    container.innerHTML = "";

    if (!state) { 
        container.innerHTML = "<p class='warning'>Please select a state.</p>"; 
        return; 
    }

    container.innerHTML = "<h3>Select Exams:</h3>";

    if(stateExams[state]){
        for (let exam in stateExams[state]) {
            container.innerHTML += `<label><input type="checkbox" value="${exam}" data-state="true"> ${exam}</label><br>`;
        }
    }

    for (let exam in nationalExams) {
        container.innerHTML += `<label><input type="checkbox" value="${exam}" data-state="false"> ${exam}</label><br>`;
    }

    container.innerHTML += `<br><button class="btn" onclick="generateForms()">Continue</button>`;
}

function generateForms() {
    const selected = document.querySelectorAll('#examSelection input[type="checkbox"]:checked');
    const container = document.getElementById("examForms");
    container.innerHTML = "";

    if (selected.length === 0) { 
        container.innerHTML = "<p class='warning'>Please select at least one exam.</p>"; 
        return; 
    }

    selected.forEach((checkbox, index) => {
        const exam = checkbox.value;
        const isState = checkbox.dataset.state === "true";

        container.innerHTML += `
        <div class="exam-block">
            <h3>${exam}</h3>

            <label>Have you registered?</label><br>
            <input type="radio" name="reg${index}" value="yes"> Yes
            <input type="radio" name="reg${index}" value="no"> No
            <br><br>

            <label>Have you paid the fee?</label><br>
            <input type="radio" name="pay${index}" value="yes"> Yes
            <input type="radio" name="pay${index}" value="no"> No
            <br><br>

            <button class="btn" onclick="evaluateStatus('${exam}', ${index}, ${isState})">
                Check Deadlines
            </button>

            <div id="result${index}"></div>
        </div>
        `;
    });
}

function evaluateStatus(exam, index, isState) {

    const reg = document.querySelector(`input[name="reg${index}"]:checked`);
    const pay = document.querySelector(`input[name="pay${index}"]:checked`);
    const resultDiv = document.getElementById(`result${index}`);

    if (!reg || !pay) {
        resultDiv.innerHTML = "<p class='warning'>Please answer both questions.</p>";
        return;
    }

    const schedule = isState 
        ? stateExams[document.getElementById("stateSelect").value][exam]
        : nationalExams[exam];

    const safeExamId = exam.replace(/\s/g,'');

    if (reg.value === "no") {

        resultDiv.innerHTML = `
            <p class='warning'>⚠ You have not registered yet!</p>
            <a href="${schedule.regLink}" target="_blank" class="btn">Register Now</a>
            <div class='countdown' id="reg${safeExamId}${index}"></div>
        `;

        startCountdown(schedule.regDeadline, `reg${safeExamId}${index}`, true);

    } else if (reg.value === "yes" && pay.value === "no") {

        resultDiv.innerHTML = `
            <p class='warning'>⚠ Registration done, but payment pending!</p>
            <a href="${schedule.regLink}" target="_blank" class="btn">Complete Payment</a>
            <div class='countdown' id="reg${safeExamId}${index}"></div>
        `;

        startCountdown(schedule.regDeadline, `reg${safeExamId}${index}`, true);

    } else {

        resultDiv.innerHTML = `
            <p class='success'>✅ Registration & payment completed!</p>
            <div class='countdown' id="exam${safeExamId}${index}"></div>
        `;

        startCountdown(schedule.examDate, `exam${safeExamId}${index}`);
    }
}

function startCountdown(target, elementId, isDeadline=false){

    function update() {
        const now = new Date();
        const diff = target - now;
        const el = document.getElementById(elementId);

        if(!el) return;

        if(diff <= 0){ 
            el.innerText = isDeadline ? "Registration Closed" : "Exam Day Reached!";
            clearInterval(timer);
            return;
        }

        const d = Math.floor(diff/(1000*60*60*24));
        const h = Math.floor((diff/(1000*60*60))%24);
        const m = Math.floor((diff/(1000*60))%60);
        const s = Math.floor((diff/1000)%60);

        el.innerText = `Time Remaining: ${d}d ${h}h ${m}m ${s}s`;
    }

    update();
    const timer = setInterval(update,1000);
}

</script>

</body>

</html>
